name: Verify Project and Issue Badge

on:
  workflow_dispatch:
    inputs:
      user_id:
        description: 'Leapr User ID'
        required: true
      user_email:
        description: 'User email for Certifier'
        required: true

jobs:
  verify-and-badge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Check Risk_Assessment.md exists and is not empty
        run: |
          if [ ! -f "Risk_Assessment.md" ]; then
            echo "FAIL: Risk_Assessment.md not found"
            exit 1
          fi
          if [ ! -s "Risk_Assessment.md" ]; then
            echo "FAIL: Risk_Assessment.md is empty"
            exit 1
          fi
          echo "PASS: Risk_Assessment.md verified"

      - name: Notify Leapr (mark project complete)
        run: |
          curl -X POST ${{ secrets.SUPABASE_PROJECT_URL }}/functions/v1/project-complete \
            -H "Authorization: Bearer ${{ secrets.PROJECT_COMPLETE_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "{\"user_id\": \"${{ github.event.inputs.user_id }}\"}"

      - name: Issue Certifier badge
        run: |
          curl -X POST https://api.certifier.io/v1/credentials \
            -H "Authorization: Bearer ${{ secrets.CERTIFIER_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"group\": \"${{ secrets.CERTIFIER_GROUP_ID }}\",
              \"recipient\": {
                \"name\": \"${{ github.event.inputs.user_id }}\",
                \"email\": \"${{ github.event.inputs.user_email }}\"
              },
              \"issued_on\": \"$(date +%Y-%m-%d)\"
            }"
